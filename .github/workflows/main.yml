name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    types: [opened, reopened]
    branches: ["main"]
    
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set-up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
      - name: Install Dependencies
        run: npm install
      - name: Lint
        run: npx eslint script.js

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - name: Set-up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
      - name: Install Dependencies
        run: npm install mocha chai jsdom
        
      - name: Run tests with DOM mock
        run: |
          cat > run-tests.js << 'EOF'
          const chai = require('chai');
          const expect = chai.expect;
          const fs = require('fs');
          const { JSDOM } = require('jsdom');
          
          // Create fake DOM environment
          const dom = new JSDOM('<!DOCTYPE html><html><body></body></html>');
          global.document = dom.window.document;
          global.window = dom.window;
          
          // Mock common DOM elements that might be accessed
          const mockElement = {
            addEventListener: () => {},
            removeEventListener: () => {},
            value: '',
            innerHTML: '',
            style: {},
            classList: {
              add: () => {},
              remove: () => {}
            }
          };
          
          // Mock getElementById to return a mock element
          global.document.getElementById = (id) => mockElement;
          global.document.querySelector = (selector) => mockElement;
          global.document.querySelectorAll = () => [];
          
          // Load your script
          console.log("Loading script.js with DOM mock...");
          try {
            eval(fs.readFileSync('./script.js', 'utf8'));
            console.log("✅ script.js loaded successfully");
          } catch (err) {
            console.error("❌ Error loading script.js:", err.message);
            process.exit(1);
          }
          
          // Verify functions exist
          if (typeof integerToRoman === 'undefined') {
            console.error("❌ integerToRoman function not found!");
            console.error("Make sure integerToRoman is defined globally in script.js");
            process.exit(1);
          }
          if (typeof romanToInteger === 'undefined') {
            console.error("❌ romanToInteger function not found!");
            process.exit(1);
          }
          
          console.log("✅ Functions found");
          console.log("Testing integerToRoman(1):", integerToRoman(1));
          console.log("Testing romanToInteger('I'):", romanToInteger('I'));
          console.log("");
          
          // Load and run tests
          const testsContent = fs.readFileSync('./tests.js', 'utf8');
          
          let passed = 0;
          let failed = 0;
          let testResults = [];
          
          // Mock describe and it for testing
          global.describe = (name, fn) => {
            console.log(`\n📋 ${name}`);
            try {
              fn();
            } catch (err) {
              console.error(`  Error in describe block: ${err.message}`);
            }
          };
          
          global.it = (name, fn) => {
            try {
              fn();
              passed++;
              console.log(`  ✓ ${name}`);
              testResults.push({ name, status: 'pass' });
            } catch (err) {
              failed++;
              console.log(`  ✗ ${name}`);
              console.log(`    Error: ${err.message}`);
              testResults.push({ name, status: 'fail', error: err.message });
            }
          };
          
          global.chai = chai;
          global.expect = expect;
          
          // Run the tests
          console.log("Running tests...");
          try {
            eval(testsContent);
          } catch (err) {
            console.error("❌ Error running tests:", err.message);
            process.exit(1);
          }
          
          console.log(`\n${'='.repeat(50)}`);
          console.log(`RESULTS: ${passed} passed, ${failed} failed`);
          console.log(`${'='.repeat(50)}`);
          
          if (failed > 0) {
            console.log(`\n❌ ${failed} test(s) failed`);
            process.exit(1);
          } else if (passed === 0) {
            console.error("\n❌ No tests were executed!");
            process.exit(1);
          } else {
            console.log(`\n✅ All ${passed} tests passed!`);
            process.exit(0);
          }
          EOF
          
          node run-tests.js

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - run: mkdir -p dist
      - run: |
          cp index.html dist/ 2>/dev/null || echo "No index.html found"
          cp script.js dist/ 2>/dev/null || echo "No script.js found"
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'dist'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
