name: CI (Simple Node Version)

on:
  push:
    branches: ["main"]
  pull_request:
    types: [opened, reopened]
    branches: ["main"]
    
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set-up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
      - name: Install Dependencies
        run: npm install mocha chai
      - name: Create Node test runner
        run: |
          cat > run-tests.js << 'EOF'
          const chai = require('chai');
          const expect = chai.expect;
          const fs = require('fs');
          
          // Load your functions (assuming they're exported)
          // If not exported, we'll need to eval them
          const scriptContent = fs.readFileSync('./script.js', 'utf8');
          
          // Create a sandbox environment
          const sandbox = {
            expect: expect,
            console: console,
            // Add any browser globals your code expects
            window: { document: {} }
          };
          
          // Run the script in sandbox
          const scriptWrapper = new Function('sandbox', 'with(sandbox) { ' + scriptContent + ' }');
          scriptWrapper(sandbox);
          
          // Get the functions from sandbox
          const integerToRoman = sandbox.integerToRoman;
          const romanToInteger = sandbox.romanToInteger;
          
          // Verify functions exist
          if (!integerToRoman || !romanToInteger) {
            console.error('ERROR: Functions not found in script.js');
            console.error('Make sure integerToRoman and romanToInteger are defined globally');
            process.exit(1);
          }
          
          console.log('✅ Functions loaded successfully');
          console.log('Testing integerToRoman(1):', integerToRoman(1));
          console.log('Testing romanToInteger("I"):', romanToInteger("I"));
          console.log('');
          
          // Load and run your tests
          const testsContent = fs.readFileSync('./tests.js', 'utf8');
          
          // Override describe/it to capture results
          let failures = [];
          let passes = [];
          
          global.describe = (name, fn) => {
            console.log(`\n📋 ${name}`);
            fn();
          };
          
          global.it = (name, fn) => {
            try {
              fn();
              passes.push(name);
              console.log(`  ✓ ${name}`);
            } catch (err) {
              failures.push({ name, error: err.message });
              console.log(`  ✗ ${name}`);
              console.log(`    ${err.message}`);
            }
          };
          
          global.chai = chai;
          global.expect = expect;
          
          // Run the tests
          eval(testsContent);
          
          // Report results
          console.log('\n' + '='.repeat(50));
          console.log(`RESULTS: ${passes.length} passed, ${failures.length} failed`);
          console.log('='.repeat(50));
          
          if (failures.length > 0) {
            console.error('\n❌ TEST FAILURES:');
            failures.forEach(f => {
              console.error(`  - ${f.name}: ${f.error}`);
            });
            process.exit(1);
          } else {
            console.log('\n✅ ALL TESTS PASSED!');
            process.exit(0);
          }
          EOF
      - name: Run tests
        run: node run-tests.js
